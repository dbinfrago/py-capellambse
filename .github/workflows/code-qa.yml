# vim:set fdm=marker:

name: Code QA

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref_type == 'tag' && github.sha || '0' }}
  cancel-in-progress: true

jobs:
  pre-commit: # {{{1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: "3.12"
      - name: Run Pre-Commit
        run: make lint

  sdist: # {{{1
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/
          if-no-files-found: error

  build: # {{{1
    name: Build ${{ matrix.abi}} wheel for ${{ matrix.platform.tag }} / ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        abi:
          - abi3
          - python3.13t
          - python3.14t
        platform:
          # Linux manylinux {{{
          - runner: ubuntu-22.04
            target: x86_64
            tag: manylinux
            manylinux: auto
          - runner: ubuntu-22.04
            target: x86
            tag: manylinux
            manylinux: auto
          - runner: ubuntu-22.04
            target: aarch64
            tag: manylinux
            manylinux: auto
          - runner: ubuntu-22.04
            target: armv7
            tag: manylinux
            manylinux: auto
          - runner: ubuntu-22.04
            target: s390x
            tag: manylinux
            manylinux: auto
          - runner: ubuntu-22.04
            target: ppc64le
            tag: manylinux
            manylinux: auto
          # }}}
          # Linux musllinux {{{
          - runner: ubuntu-22.04
            target: x86_64
            tag: musllinux
            manylinux: musllinux_1_2
          - runner: ubuntu-22.04
            target: x86
            tag: musllinux
            manylinux: musllinux_1_2
          - runner: ubuntu-22.04
            target: aarch64
            tag: musllinux
            manylinux: musllinux_1_2
          - runner: ubuntu-22.04
            target: armv7
            tag: musllinux
            manylinux: musllinux_1_2
          # }}}
          # macOS {{{
          - runner: macos-15-intel
            target: x86_64
            tag: macos
          - runner: macos-latest
            target: aarch64
            tag: macos
          # }}}
          # Windows {{{
          - runner: windows-latest
            target: x64
            tag: windows
          - runner: windows-latest
            target: x86
            tag: windows
          # }}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: ${{ matrix.abi == 'abi3' && '3.13' || matrix.abi }}
      - name: Build the wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist ${{ matrix.abi != 'abi3' && format('-i {0}', matrix.abi) || '' }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
      - name: Run unittests
        if: matrix.abi == 'abi3' && matrix.platform.tag != 'musllinux' && (matrix.platform.target == 'x86_64' || matrix.platform.target == 'x64')
        run: |-
          echo "::group::Prepare test environment"
          uv sync --group test --no-install-project
          . .venv/bin/activate
          uv pip install dist/*.whl
          echo "::endgroup::"

          coverage run
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wheel-${{ matrix.platform.tag }}-${{ matrix.abi }}-${{ matrix.platform.target }}
          path: dist/
          if-no-files-found: error

  publish: # {{{1
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, sdist, example-notebooks]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/capellambse
    permissions:
      id-token: write
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v6
        with:
          path: dist/
          name: sdist
      - name: Download built wheels
        uses: actions/download-artifact@v6
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Push to release branch
        continue-on-error: true
        env:
          GITHUB_REF: ${{github.ref}}
        run: |-
          releasever="$(echo "$GITHUB_REF" | grep -Po '(?<=^refs/tags/v)(?:0\.)?[1-9][0-9]*').x"
          if [[ "$releasever" = 0.5.x ]]; then releasever="${releasever%.x}"; fi
          git push origin "HEAD:release-$releasever"

  example-notebooks: # {{{1
    name: Run and verify the example notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: "3.12"
      - name: Run example notebooks
        run: make verify-examples

  docs: # {{{1
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: "3.12"
      - name: Install system-level dependencies
        run: sudo apt-get install -y pandoc
      - name: Create docs
        env:
          SPHINXOPTS: ""
        run: make docs
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master'
        with:
          force_orphan: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html

  downstream-tests: # {{{1
    name: Run downstream tests in ${{matrix.repo}}
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        repo:
          - dbinfrago/capellambse-context-diagrams
          - dbinfrago/capella-polarion
          - dbinfrago/json2capella
          - dbinfrago/capella-ros-tools
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
          repository: ${{matrix.repo}}
      - uses: actions/download-artifact@v6
        with:
          path: dist/
          name: wheel-manylinux-x86_64
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: "3.13"
      - name: Setup deno (for context-diagrams only)
        uses: denoland/setup-deno@v2
        if: matrix.repo == 'dbinfrago/capellambse-context-diagrams'
        with:
          deno-version: "2.5.x"
      - run: |-
          echo SETUPTOOLS_SCM_PRETEND_VERSION="$(
            uvx --with setuptools_scm python -c \
              "import setuptools_scm as scm; print(scm.get_version())"
          )" >> "$GITHUB_ENV"
      - run: uv add --dev ./dist/*.whl pytest pytest-xdist && uv sync
      - run: uv run pytest -n auto
